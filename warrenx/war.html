<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CCST College Enrollment Form</title>
<body><br>
<div class="container"><br>
    <h2>CCST College Enrollment Form</h2>

    <form>

        <label>First Name*</label><br>
        <input type="text" required><br>

        <label>Middle Name</label><br>
        <input type="text"><br>

        <label>Last Name*</label><br>
        <input type="text" required><br>

        <label>Birthday*</label><br>
        <input type="date" required><br>

        <label>Birthplace*</label><br>
        <input type="text" required><br>

        <label>Age*</label><br>
        <input type="number" required><br>

        <label>Year Level*</label><br>
        <select required><br>
            <option value="">Select Year Level</option><br>
            <option>1st Year</option><br>
            <option>2nd Year</option><br>
            <option>3rd Year</option><br>
            <option>4th Year</option><br>
        </select><br>

        <label>Course*</label><br>
        <select required><br>
            <option value="">Select Course</option><br>
            <option>ACT</option><br>
            <option>BSOA</option><br>
            <option>ENTREP</option><br>
            <option>HM</option><br>
            <option>CT</option><br>
        </select><br>

        <label>Citizenship*</label><br>
        <input type="text" value="Filipino"><br>

        <label>Sex*</label><br>
        <div class="radio-group"><br>
            <input type="radio" name="sex"> Male<br>
            <input type="radio" name="sex"> Female<br>
        </div><br>

        <label>Civil Status*</label><br>
        <select><br>
            <option>Single</option><br>
            <option>Married</option><br>
            <option>Widowed</option><br>
        </select><br>

        <label>Region*</label><br>
        <input type="text"><br>

        <label>Province*</label><br>
        <input type="text"><br>

        <label>City*</label><br>
        <input type="text"><br>

        <label>Barangay*</label><br>
        <input type="text"><br>

        <label>House No./Street*</label><br>
        <input type="text"><br>

        <label>Contact No.*</label><br>
        <input type="text"><br>

        <label>Credentials Submitted*</label><br>
        <div class="checkbox-group"><br>
            <input type="checkbox"> Form 138<br>
            <input type="checkbox"> Form 137<br>
            <input type="checkbox"> Birth Certificate<br>
            <input type="checkbox"> Good Moral Certificate<br>
            <input type="checkbox"> Transcript of Records<br>
            <input type="checkbox"> Picture<br>
            <input type="checkbox"> PSA / NSO<br>
        </div><br>

        <div class="buttons"><br>
            <button type="submit" class="submit-btn">Submit</button><br>
            <button type="reset" class="clear-btn">Clear</button><br>
        </div><br>

    </form><br>
</div><br>
</body><br>
</html><br>
